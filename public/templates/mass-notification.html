<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}} — {{appName}}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">
    <table align="center" cellpadding="0" cellspacing="0" width="600"
           style="margin:30px auto;background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;">

      <!-- Header -->
      <tr>
        <td style="background-color:#ea580c;padding:28px 40px;">
          <p style="margin:0;font-size:22px;font-weight:bold;color:#ffffff;letter-spacing:-0.5px;">
            {{appName}}
          </p>
          <p style="margin:6px 0 0;font-size:12px;color:#fed7aa;">Member Communication</p>
        </td>
      </tr>

      <!-- Title band -->
      <tr>
        <td style="background-color:#fff7ed;padding:20px 40px;border-bottom:1px solid #fed7aa;">
          <h1 style="margin:0;font-size:20px;color:#7c2d12;line-height:1.3;">{{title}}</h1>
        </td>
      </tr>

      <!-- Body -->
      <tr>
        <td style="padding:32px 40px;">
          <p style="margin:0 0 16px;font-size:15px;color:#475569;">Hi {{name}},</p>
          <div style="font-size:15px;color:#334155;line-height:1.7;white-space:pre-line;">{{message}}</div>
        </td>
      </tr>

      <!-- Divider -->
      <tr>
        <td style="padding:0 40px;">
          <hr style="border:none;border-top:1px solid #e2e8f0;margin:0;" />
        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td style="padding:24px 40px;background-color:#f8fafc;">
          <p style="margin:0;font-size:13px;color:#94a3b8;">
            This message was sent to you as a member of <strong>{{appName}}</strong>.
            If you have questions, reply to this email or visit your member dashboard.
          </p>
          <p style="margin:12px 0 0;font-size:13px;color:#94a3b8;">
            &copy; {{appName}}. All rights reserved.
          </p>
        </td>
      </tr>

    </table>
  </body>
</html>
